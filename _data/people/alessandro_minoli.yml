bio: PhD Student at IDSIA USI-SUPSI since 2025. Holds a Master's degree (2025) from the University of Milan, with a thesis on models and algorithms for the optimal allocation of services in Vehicle-to-Cloud architectures. His research focuses on data-driven optimization algorithms on graphs, as well as exact and heuristic methods for combinatorial optimization problems.
interests:
  - Combinatorial Optimization
  - Data-Driven Optimization
  - Machine Learning
  - Heuristic and Exact Algorithms
  - Routing Problems
