bio: Senior Researcher at IDSIA USI-SUPSI since 2010. Holds a Master's degree (2001) and Ph.D. in Computer Science (2006) from the University of Milan, with a thesis on Branch and Price algorithms for Vehicle Routing Problems. Previously PostDoc at EPFL's Transp-OR laboratory (2006–2009). His research focuses on exact and heuristic algorithms for combinatorial optimization, quantitative methods for decision support, and applications in transportation, logistics, energy, and finance. H-index of 22 with over 3,800 Google Scholar citations.
interests:
  - Combinatorial Optimization
  - Vehicle Routing Problems
  - Transportation and Logistics
  - Energy Management
  - Heuristic and Exact Algorithms
