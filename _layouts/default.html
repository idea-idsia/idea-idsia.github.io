<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.project_name %}{{ page.project_name }} | {{ site.title }}{% elsif page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.short_summary | default: page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.4/css/academicons.min.css">
  {% if page.plotly %}
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  {% endif %}
  {% feed_meta %}
</head>
<body>

  {% include header.html %}

  <main class="page-content">
    {{ content }}
  </main>

  {% include footer.html %}

</body>
</html>
